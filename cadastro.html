<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Finança Academy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d6efd;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.titulo{
    color:white;
    font-size:40px;
    font-weight:bold;
    margin-bottom:30px;
    text-align:center;
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:white;
    width:350px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0b5ed7;
}
</style>
</head>
<body>

<h1 class="titulo">Next Finança Academy</h1>

<div class="container">

    <div class="card">
        <h2>Cadastro</h2>

        <form>
            <input type="text" placeholder="Nome Completo" required>
            <input type="email" placeholder="E-mail" required>
            <input type="text" placeholder="CPF" required>
            <input type="password" placeholder="Senha" required>

            <button>
                <a href="index.html" style="color:rgb(255, 255, 255); text-decoration:none;">Cadastrar</a>
            </button>
        </form>
    </div>

    <div class="card">
        <h2>Confirme Seu Cadastro
        </h2>

        <form>
            <input type="email" placeholder="E-mail" required>
            <input type="password" placeholder="Senha" required>

            <button>
                <a href="index.html" style="color:rgb(255, 255, 255); text-decoration:none;">Entrar</a>
            </button>
        </form>
    </div>

</div>

</body>
</html>
